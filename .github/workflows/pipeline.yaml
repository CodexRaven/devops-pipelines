name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps: # Now correctly indented
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4 (v5 isn't standard yet)

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install dependencies
        run: npm Install # Lowercase 'i'

      - name: Run tests
        run: npm test